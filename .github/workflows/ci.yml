name: CI

on:
  push:
    branches:
      - master
      - main
      - "feature/**"
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0.33
        env:
          MYSQL_ROOT_PASSWORD: ci-root-password
          MYSQL_DATABASE: mobility_sharing
          MYSQL_USER: mobility
          MYSQL_PASSWORD: ci-db-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pci-root-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_URL: jdbc:mysql://127.0.0.1:3306/mobility_sharing?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: mobility
      DB_PASSWORD: ci-db-password
      DB_DRIVER_CLASS: com.mysql.cj.jdbc.Driver
      JWT_SECRET_KEY: bW9iaWxpdHktc2hhcmluZy1jaS1qd3Qtc2VjcmV0LWZvci10ZXN0cy0xMjM0NTY3ODkw
      JWT_EXPIRATION: 86400000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000
      SPRING_SECURITY_USER_NAME: ci-admin
      SPRING_SECURITY_USER_PASSWORD: ci-admin-password
      SWAGGER_UI_PATH: /doc

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        working-directory: backend
        run: chmod +x ./mvnw

      - name: Run Maven tests
        working-directory: backend
        run: ./mvnw test

  angular-build:
    name: Angular/Ionic build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend-angular-ionic
        run: npm install

      - name: Build Angular/Ionic app
        working-directory: frontend-angular-ionic
        run: npm run build

  react-web-build:
    name: React Native/Expo web export
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-react-expo/package-lock.json

      - name: Install dependencies
        working-directory: frontend-react-expo
        run: npm ci

      - name: Export Expo web app
        working-directory: frontend-react-expo
        env:
          EXPO_PUBLIC_API_URL: http://localhost:8080
        run: npm run export:web

  compose-config:
    name: Docker Compose config
    runs-on: ubuntu-latest

    env:
      MYSQL_ROOT_PASSWORD: ci-root-password
      MYSQL_DATABASE: mobility_sharing
      MYSQL_USER: mobility
      MYSQL_PASSWORD: ci-db-password
      JWT_SECRET_KEY: bW9iaWxpdHktc2hhcmluZy1jaS1qd3Qtc2VjcmV0LWZvci1kb2NrZXItY29uZmlnLTEyMzQ1
      JWT_EXPIRATION: 86400000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000
      SPRING_SECURITY_USER_NAME: ci-admin
      SPRING_SECURITY_USER_PASSWORD: ci-admin-password
      SWAGGER_UI_PATH: /doc

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate compose file
        run: docker compose config
