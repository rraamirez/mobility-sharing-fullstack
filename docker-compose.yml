services:
  db:
    image: mirror.gcr.io/library/mysql:8.0.33
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mobility_sharing}
      MYSQL_USER: ${MYSQL_USER:-mobility}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mobility}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-mobility_sharing}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: ${MYSQL_USER:-mobility}
      DB_PASSWORD: ${MYSQL_PASSWORD:-mobility}
      DB_DRIVER_CLASS: com.mysql.cj.jdbc.Driver
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-3f8b1de76ab04308b4d4b5fc1c7c9aab3f8b1de76ab04308b4d4b5fc1c7c9aab}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-604800000}
      SPRING_SECURITY_USER_NAME: ${SPRING_SECURITY_USER_NAME:-admin}
      SPRING_SECURITY_USER_PASSWORD: ${SPRING_SECURITY_USER_PASSWORD:-admin}
      SWAGGER_UI_PATH: ${SWAGGER_UI_PATH:-/doc}
    ports:
      - "8080:8080"
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9090/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  frontend-ionic:
    build:
      context: ./frontend-angular-ionic
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

  frontend-react:
    build:
      context: ./frontend-react-expo
      args:
        EXPO_PUBLIC_API_URL: http://localhost:8080
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3001:80"

volumes:
  mysql-data:
